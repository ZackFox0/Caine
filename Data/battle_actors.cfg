; =============================================================
; CHARACTER ROSTER
; Sections prefixed with "character." define a reusable character.
; animation  = SpriteFrames animation name in Battle_Actor.tscn
; speed      = action points gained per second (100 = ready to act)
; =============================================================

; =============================================================
; ACTION SLOT DEFINITIONS
; action_slot.N sections are shared defaults/fallbacks.
; character.<Name>.action_slot.N overrides per character.
; kind        = attack | empty
; cost        = action points consumed when this action is used
; power_scale = attack_power multiplier for damage actions
; =============================================================

[action_slot.0]
name = "Attack"
kind = "attack"
cost = 100.0
power_scale = 1.0

[action_slot.1]
name = "Heavy Attack"
kind = "attack"
cost = 100.0
power_scale = 1.6

[action_slot.2]
name = "Special"
kind = "attack"
cost = 100.0
power_scale = 2.0

[action_slot.3]
name = "Empty"
kind = "empty"
cost = 100.0
power_scale = 0.0

